services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brindin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/brindin-assets;
      echo 'Bucket brindin-assets created successfully';
      "

  # ---------- Application services ----------

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: brindin-backend:latest
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brindin
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_BUCKET: brindin-assets
      PORT: "3001"
      API_KEY: ${API_KEY:-dev-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-workers:
    image: brindin-backend:latest
    command: ["node", "packages/backend/dist/workers/start.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brindin
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_BUCKET: brindin-assets
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

  python-workers:
    build:
      context: ./packages/workers-py
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brindin
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_BUCKET: brindin-assets
    ports:
      - "3002:3002"
    depends_on:
      backend:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: build
    command: ["npx", "drizzle-kit", "migrate"]
    working_dir: /app/packages/backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brindin
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

volumes:
  pgdata:
  minio-data:
